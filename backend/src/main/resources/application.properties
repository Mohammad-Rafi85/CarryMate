# ==============================================================================
#                      CARRYMATE PRODUCTION CONFIGURATION
# ==============================================================================

spring.application.name=carrymate

# Server Configuration (Render provides PORT)
server.port=${PORT:8080}

# ------------------------------------------------------------------------------
# 1. DATABASE CONFIGURATION
# Render typically provides a MySQL or PostgreSQL URL. Hibernate 6 automatically
# detects the dialect based on the DB URL.
# ------------------------------------------------------------------------------
spring.datasource.url=${DATABASE_URL:jdbc:h2:mem:carrymate_db;DB_CLOSE_DELAY=-1}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}
# Only set driver if using H2 default locally. For MySQL/PostgreSQL, Spring handles it.
# spring.datasource.driver-class-name=org.h2.Driver 

# Hibernate / JPA Settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# ------------------------------------------------------------------------------
# 2. SECURITY & AUTH (Environment Specific)
# ------------------------------------------------------------------------------
