spring.application.name=carrymate

# Database Configuration (H2 Embedded)
spring.datasource.url=jdbc:h2:mem:carrymate_db
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.h2.console.enabled=true
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Security Configuration
carrymate.jwt.secret=9a67475d459d49c6a1e9c8e1e1e1e1e1e1e1e1e1e1e1e1e1e1e1e1e1e1e1e1e1
carrymate.jwt.expiration=86400000

# Server Port
server.port=8080

# Logging
logging.level.org.springframework.security=DEBUG
